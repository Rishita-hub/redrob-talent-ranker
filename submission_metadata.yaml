ai_tools_used:
  - "Gemini"

ai_usage_summary: |
  Used Gemini for architectural consultation, debugging runtime OS file errors, 
  and structural code review. No candidate data was sent to any LLM APIs; 
  all processing was executed locally on CPU.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based robust ranker with explicit deterministic reasoning. Generates open-ended 
  dynamic vocabulary frequency extraction from arbitrary job descriptions to combat non-AI 
  unrelated target shifts. Features a multi-track fraud verification defense matrix targeting 
  timeline history overlaps, keyword-stuffers, and impossible skill durations. Scores are 
  calibrated using a global linear scalar transformation to prevent compression and preserve 
  separation between elite candidates. Runtime is under 1 minute.

